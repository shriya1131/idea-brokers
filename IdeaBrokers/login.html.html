<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {background:#0b1c2c;color:white;text-align:center;padding:100px;}
input,button {padding:10px;margin:10px;width:250px;}
button {background:#00d4ff;border:none;}
</style>
</head>

<body>

<h2>Login</h2>

<input id="name" placeholder="Enter Name"><br>
<input id="email" placeholder="Enter Email"><br>

<button onclick="login()">Login</button>

<script>
function login(){
let name = document.getElementById("name").value;
localStorage.setItem("user", name);
window.location.href="index.html";
}
</script>

</body>
</html>
