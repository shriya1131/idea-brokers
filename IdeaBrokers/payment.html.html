<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body {
  background:#0b1c2c;
  color:white;
  text-align:center;
  padding:50px;
  font-family:'Segoe UI';
}

.box {
  background:#112f45;
  padding:30px;
  border-radius:12px;
  width:300px;
  margin:auto;
}

button {
  margin-top:15px;
  padding:12px;
  width:100%;
  background:linear-gradient(90deg,#00d4ff,#2ecc71);
  border:none;
  border-radius:8px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h2>Complete Payment</h2>

<p>Idea: <span id="idea"></span></p>

<p style="font-size:20px;color:#2ecc71;">
Amount: ₹<span id="price"></span>
</p>

<button onclick="pay()">Pay Now 💳</button>

</div>

<script>
document.getElementById("idea").innerText = localStorage.getItem("idea");
document.getElementById("price").innerText = localStorage.getItem("price");

function pay(){
alert("Payment Successful!");
window.location.href="full.html";
}
</script>

</body>
</html>
